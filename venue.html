  <meta charset="UTF-8" />

    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Venue Details | TANIDIK</title>

  <meta
    name="description"
    content="View venue details, events, ratings, reviews, and favorites on TANIDIK."
  />

  <meta name="theme-color" content="#020205" />

  <link
    rel="icon"
    href="./assets/favicon.svg"
    type="image/svg+xml"
  />

  <link rel="manifest" href="./manifest.webmanifest" />

  <link rel="apple-touch-icon" href="./assets/icon-192.png" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="TANIDIK" />
  <meta property="og:title" content="Venue Details | TANIDIK" />
  <meta
    property="og:description"
    content="View venue details, events, ratings, reviews, and favorites on TANIDIK."
  />
  <meta property="og:url" content="https://hilarious-kheer-076854.netlify.app/venue.html" />
  <meta property="og:image" content="https://hilarious-kheer-076854.netlify.app/assets/social-preview.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Venue Details | TANIDIK" />
  <meta
    name="twitter:description"
    content="View venue details, events, ratings, reviews, and favorites on TANIDIK."
  />
  <meta name="twitter:image" content="https://hilarious-kheer-076854.netlify.app/assets/social-preview.png" />

  <link
    rel="stylesheet"
    href="./css/style.css"
  />
</head>

<body class="app-shell">

  <nav class="navbar">

    <h1>TANIDIK</h1>

    <button
      class="nav-toggle"
      type="button"
      aria-label="Toggle navigation"
      aria-expanded="false"
    >
      Menu
    </button>

    <div class="nav-links">

      <a href="./index.html">Home</a>

      <a href="./discover.html">Discover</a>

      <a href="./events.html">Events</a>

      <a href="./favorites.html">Favorites</a>

      <a
        href="./auth.html"
        id="authLink"
      >
        Login
      </a>

    </div>

  </nav>

  <main class="venue-page public-detail venue-detail-page">

    <img
      id="venueImage"
      class="venue-hero-image"
      alt="Venue image"
    />

    <div class="venue-details">

      <span class="venue-meta">
        Venue
      </span>

      <h1 id="venueName">
        Loading...
      </h1>

      <p id="venueCity"></p>

      <p id="venueDescription"></p>

      <div
        id="venueAverageRating"
        class="average-rating"
      >
        No ratings yet
      </div>

      <section
        id="venueLocationSection"
        class="location-section public-section public-section--location"
      >
        <h2 class="section-title">
          Location
        </h2>

        <p id="venueAddress"></p>

        <iframe
          id="venueMap"
          class="location-map"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>

        <a
          id="venueMapsLink"
          class="secondary-btn"
          target="_blank"
          rel="noopener"
        >
          Open in Google Maps
        </a>
      </section>

      <div class="detail-actions">

        <button
          id="detailFavoriteBtn"
          class="btn"
        >
          Add to Favorites
        </button>

        <a
          href="./discover.html"
          class="secondary-btn"
        >
          Back to Discover
        </a>

      </div>

      <section class="public-section public-section--reviews">
        <h2 class="section-title">
          Reviews
        </h2>

        <form
          id="reviewForm"
          class="review-form"
        >
          <select
            id="reviewRating"
            class="review-rating-select"
            required
          >
            <option value="">
              Rating
            </option>
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>

          <textarea
            id="reviewText"
            class="review-textarea"
            maxlength="240"
            placeholder="Write a short review..."
            required
          ></textarea>

          <button
            type="submit"
            class="btn"
          >
            Submit Review
          </button>
        </form>

        <p
          id="reviewMessage"
          class="page-message"
        ></p>

        <div
          id="venueReviews"
          class="reviews-list"
        >
        </div>
      </section>

      <section class="public-section public-section--reservations">
        <h2 class="section-title">
          Reservations
        </h2>

        <form
          id="reservationForm"
          class="reservation-form"
        >
          <input
            type="date"
            id="reservationDate"
            required
          />

          <input
            type="time"
            id="reservationTime"
            required
          />

          <input
            type="number"
            id="reservationPartySize"
            min="1"
            max="20"
            placeholder="Party size"
            required
          />

          <textarea
            id="reservationNote"
            placeholder="Optional note"
          ></textarea>

          <button
            type="submit"
            class="btn"
          >
            Request Reservation
          </button>
        </form>

        <p
          id="reservationMessage"
          class="page-message"
        ></p>

        <div
          id="userReservations"
          class="reservation-list"
        >
        </div>
      </section>

      <section class="public-section public-section--events">
        <h2 class="section-title">
          Events at this venue
        </h2>

        <div
          id="venueEvents"
          class="venues-grid"
        >
        </div>
      </section>

    </div>

  </main>

  <nav class="app-tabbar" aria-label="Primary">
    <div class="app-tabbar__dock">
      <a href="./index.html" class="app-tabbar__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <path d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-5v-7H10v7H5a1 1 0 01-1-1v-9.5z" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Home</span>
      </a>
      <a
        href="./discover.html"
        class="app-tabbar__item app-tabbar__item--active"
        aria-current="page"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <circle cx="11" cy="11" r="7" />
          <path d="M20 20l-3-3" stroke-linecap="round" />
        </svg>
        <span>Discover</span>
      </a>
      <a href="./events.html" class="app-tabbar__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <rect x="4" y="5" width="16" height="14" rx="2" />
          <path d="M8 3v4M16 3v4M4 11h16" stroke-linecap="round" />
        </svg>
        <span>Events</span>
      </a>
      <a href="./messages.html" class="app-tabbar__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <path d="M21 12a8 8 0 11-4 8H8l-4 2V12a8 8 0 118-1z" stroke-linejoin="round" />
        </svg>
        <span>Messages</span>
      </a>
      <a href="./profile.html" class="app-tabbar__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <circle cx="12" cy="8" r="3.5" />
          <path d="M6 19c0-3.5 3-5.5 6-5.5s6 2 6 5.5" stroke-linecap="round" />
        </svg>
        <span>Profile</span>
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="./js/app.js"></script>

  <div id="toast" class="toast"></div>

</body>
</html>
