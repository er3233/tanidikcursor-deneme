<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Profile | TANIDIK</title>

  <meta
    name="description"
    content="View your TANIDIK profile, favorites count, reviews count, and account details."
  />

  <meta name="theme-color" content="#020205" />

  <link
    rel="icon"
    href="./assets/favicon.svg"
    type="image/svg+xml"
  />

  <link rel="manifest" href="./manifest.webmanifest" />

  <link rel="apple-touch-icon" href="./assets/icon-192.png" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="TANIDIK" />
  <meta property="og:title" content="Profile | TANIDIK" />
  <meta
    property="og:description"
    content="View your TANIDIK profile, favorites count, reviews count, and account details."
  />
  <meta property="og:url" content="https://hilarious-kheer-076854.netlify.app/profile.html" />
  <meta property="og:image" content="https://hilarious-kheer-076854.netlify.app/assets/social-preview.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Profile | TANIDIK" />
  <meta
    name="twitter:description"
    content="View your TANIDIK profile, favorites count, reviews count, and account details."
  />
  <meta name="twitter:image" content="https://hilarious-kheer-076854.netlify.app/assets/social-preview.png" />

  <link
    rel="stylesheet"
    href="./css/style.css"
  />
</head>

<body class="app-shell">

  <nav class="navbar">

    <h1>TANIDIK</h1>

    <button
      class="nav-toggle"
      type="button"
      aria-label="Toggle navigation"
      aria-expanded="false"
    >
      Menu
    </button>

    <div class="nav-links">

      <a href="./index.html">Home</a>

      <a href="./discover.html">Discover</a>

      <a href="./events.html">Events</a>

      <a href="./favorites.html">Favorites</a>

      <a
        href="./auth.html"
        id="authLink"
      >
        Login
      </a>

    </div>

  </nav>

  <main class="profile-page-wrap">

  <div class="profile-dashboard">

    <header class="dashboard-header dashboard-header--profile">
      <h1>
        Your Profile
      </h1>
    </header>

    <div class="profile-grid">

      <div class="profile-card">
        <span>Email</span>
        <strong id="userEmail">
          Loading...
        </strong>
      </div>

      <div class="profile-card">
        <span>Favorites</span>
        <strong id="profileFavoritesCount">
          0
        </strong>
      </div>

      <div class="profile-card">
        <span>Reviews</span>
        <strong id="profileReviewsCount">
          0
        </strong>
      </div>

      <div class="profile-card">
        <span>Reservations</span>
        <strong id="profileReservationsCount">
          0
        </strong>
      </div>

    </div>

    <section class="profile-notifications-section dashboard-section">

      <h2>
        Notifications
      </h2>

      <div
        id="profileNotificationsList"
        class="notifications-list"
      >
      </div>

    </section>

    <section class="profile-business-section dashboard-section dashboard-section--approvals dashboard-section--forms">

      <h2>
        Business Application
      </h2>

      <div
        id="profileBusinessApplications"
        class="business-list"
      >
      </div>

      <form
        id="businessApplicationForm"
        class="admin-form"
      >
        <input
          type="text"
          id="businessApplicationName"
          placeholder="Business Name"
          required
        />

        <input
          type="tel"
          id="businessApplicationPhone"
          placeholder="Phone"
        />

        <input
          type="text"
          id="businessApplicationAddress"
          placeholder="Address"
        />

        <textarea
          id="businessApplicationDescription"
          placeholder="Tell us about your business"
          required
        ></textarea>

        <div class="admin-form-actions">
          <button
            type="submit"
            class="btn"
          >
            Apply
          </button>
        </div>
      </form>

    </section>

    <section class="profile-reservations-section dashboard-section dashboard-section--reservations">

      <h2>
        Recent Reservations
      </h2>

      <div
        id="profileReservationsList"
        class="reservation-list"
      >
      </div>

    </section>

    <a
      id="businessDashboardLink"
      href="./business.html"
      class="secondary-btn profile-business-link"
    >
      Business Dashboard
    </a>

    <a
      href="./messages.html"
      class="secondary-btn profile-messages-link"
    >
      Messages
    </a>

    <button id="logoutBtn">
      Logout
    </button>

  </div>

  </main>

  <nav class="app-tabbar" aria-label="Primary">
    <div class="app-tabbar__dock">
      <a href="./index.html" class="app-tabbar__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <path d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-5v-7H10v7H5a1 1 0 01-1-1v-9.5z" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Home</span>
      </a>
      <a href="./discover.html" class="app-tabbar__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <circle cx="11" cy="11" r="7" />
          <path d="M20 20l-3-3" stroke-linecap="round" />
        </svg>
        <span>Discover</span>
      </a>
      <a href="./events.html" class="app-tabbar__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <rect x="4" y="5" width="16" height="14" rx="2" />
          <path d="M8 3v4M16 3v4M4 11h16" stroke-linecap="round" />
        </svg>
        <span>Events</span>
      </a>
      <a href="./messages.html" class="app-tabbar__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <path d="M21 12a8 8 0 11-4 8H8l-4 2V12a8 8 0 118-1z" stroke-linejoin="round" />
        </svg>
        <span>Messages</span>
      </a>
      <a
        href="./profile.html"
        class="app-tabbar__item app-tabbar__item--active"
        aria-current="page"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <circle cx="12" cy="8" r="3.5" />
          <path d="M6 19c0-3.5 3-5.5 6-5.5s6 2 6 5.5" stroke-linecap="round" />
        </svg>
        <span>Profile</span>
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="./js/app.js"></script>

<div id="toast" class="toast"></div>

</body>
</html>
